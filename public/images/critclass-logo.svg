<svg width="400" height="160" viewBox="0 0 400 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#a5c8ff" />
      <stop offset="100%" stop-color="#3f76ff" />
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect x="0" y="0" width="400" height="160" rx="20" ry="20" fill="rgba(255,255,255,0.05)" />
  <rect x="12" y="12" width="376" height="136" rx="18" ry="18" fill="rgba(255,255,255,0.08)" />
  <path d="M45 110 h310" stroke="rgba(255,255,255,0.25)" stroke-width="4" />
  <text x="45" y="70" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#ffffff">Crit</text>
  <text x="190" y="70" font-family="Inter, system-ui, sans-serif" font-size="46" font-weight="800" fill="#ffd166">Class</text>
  <circle cx="320" cy="50" r="14" fill="url(#logoGradient)" filter="url(#softGlow)" />
  <rect x="80" y="85" width="20" height="6" rx="3" fill="#ffffff" opacity="0.8" />
  <rect x="105" y="85" width="110" height="6" rx="3" fill="#ffffff" opacity="0.8" />
  <rect x="80" y="100" width="135" height="6" rx="3" fill="#ffffff" opacity="0.6" />
</svg>
